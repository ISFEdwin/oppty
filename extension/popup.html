<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oppty</title>
  <style>
    :root {
      --bg-base: #0d1117;
      --bg-surface: #161b22;
      --bg-card: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-amber: #d29922;
      --accent-red: #f85149;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, sans-serif;
      font-size: 13px;
    }
    .header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--accent-blue);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-label { font-size: 11px; color: var(--text-secondary); }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--border); border-radius: 10px;
      transition: 0.2s;
    }
    .slider::before {
      content: ""; position: absolute;
      height: 14px; width: 14px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: 0.2s;
    }
    input:checked + .slider { background: var(--accent-blue); }
    input:checked + .slider::before { transform: translateX(16px); }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .field-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
    }
    input[type="number"], select {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
    }
    input[type="number"]:focus, select:focus { border-color: var(--accent-blue); }

    .mode-group { display: flex; gap: 6px; }
    .mode-btn {
      flex: 1;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: 0.15s;
    }
    .mode-btn.active {
      background: rgba(88,166,255,0.15);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .save-btn {
      width: 100%;
      padding: 8px;
      background: var(--accent-blue);
      color: #0d1117;
      border: none;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
    }
    .save-btn:hover { background: #79b8ff; }

    .open-app-btn {
      width: 100%;
      padding: 7px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.15s;
    }
    .open-app-btn:hover { color: var(--text-primary); border-color: var(--accent-blue); }

    .status {
      font-size: 11px;
      color: var(--accent-green);
      text-align: center;
      min-height: 16px;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Ø oppty</div>
    <div class="toggle-row">
      <span class="toggle-label" id="toggle-label">ON</span>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="body">
    <!-- Hourly rate -->
    <div>
      <div class="field-label">Your Net Hourly Rate ($)</div>
      <input type="number" id="hourly-rate" min="1" max="999" step="0.5" value="25" />
    </div>

    <!-- Display mode -->
    <div>
      <div class="field-label">Overlay Mode</div>
      <div class="mode-group">
        <button class="mode-btn active" data-mode="hours">⬡ Work Hours</button>
        <button class="mode-btn" data-mode="fv">◈ Future Value</button>
        <button class="mode-btn" data-mode="both">Both</button>
      </div>
    </div>

    <!-- Investment settings (shown for FV mode) -->
    <div id="fv-settings" style="display:none; gap:8px; flex-direction:column;">
      <div>
        <div class="field-label">Annual Return (%)</div>
        <input type="number" id="annual-rate" min="0" max="30" step="0.1" value="7" />
      </div>
      <div>
        <div class="field-label">Investment Horizon (years)</div>
        <input type="number" id="years" min="1" max="60" step="1" value="10" />
      </div>
    </div>

    <div class="status" id="status"></div>

    <button class="save-btn" id="save-btn">◈ Apply Settings</button>
    <button class="open-app-btn" id="open-app-btn">Open Oppty App →</button>
  </div>

  <div class="footer">Oppty v1.0.0 · Opportunity Cost Overlay</div>

  <script src="popup.js"></script>
</body>
</html>
